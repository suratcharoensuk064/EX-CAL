<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine Exhaust Analysis Tool</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:#e2e8f0;
padding:20px;
}
.header{text-align:center;margin-bottom:20px;}
.main{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1300px;margin:auto;}
.panel{background:#1e293b;border-radius:12px;padding:20px;}
input{width:100%;padding:8px;background:#334155;border:none;color:white;border-radius:6px;}
label{font-size:0.8rem;}
.result{font-size:2rem;font-weight:bold;}
.green{color:#22c55e;}
.red{color:#ef4444;}
.yellow{color:#eab308;}
.blue{color:#3b82f6;}
</style>

</head>
<body>

<div class="header">
<h1>Engine Exhaust Analysis Tool</h1>
<div id="time"></div>
</div>

<div class="main">

<div class="panel">
<h3>Inputs</h3>

<label>CO2</label><input id="CO2" type="number" value="10.5">
<label>CO</label><input id="CO" type="number" value="0.5">
<label>O2</label><input id="O2" type="number" value="2">
<label>HC (ppm)</label><input id="HC" type="number" value="50">
<label>NO (ppm)</label><input id="NO" type="number" value="100">

<label>H/C</label><input id="Hcv" type="number" value="1.87">
<label>O/C</label><input id="Ocv" type="number" value="0">
<label>n</label><input id="n" type="number" value="1">

<label>Fuel flow (ml/min)</label><input id="Vf" type="number" value="5">
<label>Density</label><input id="rho" type="number" value="850">

<label>T (K)</label><input id="T" type="number" value="573">
<label>P (Pa)</label><input id="P" type="number" value="101325">

<h4>Energy Balance</h4>
<label>Water flow (kg/s)</label><input id="mW" type="number" value="0.05">
<label>Cp Water (kJ/kgK)</label><input id="CpW" type="number" value="4.186">
<label>Cp Gas (kJ/kgK)</label><input id="CpG" type="number" value="1.1">
<label>T gas in</label><input id="Tgi" type="number" value="573">
<label>T gas out</label><input id="Tgo" type="number" value="350">
<label>T water in</label><input id="Twi" type="number" value="293">
<label>T water out</label><input id="Two" type="number" value="323">

<div id="warn"></div>

</div>

<div class="panel">
<h3>Results</h3>

<div>Lambda:</div>
<div id="lambda" class="result"></div>

<div>mG Dry (kg/s):</div>
<div id="dry"></div>

<div>mG EB (kg/s):</div>
<div id="eb"></div>

<div>Error (%):</div>
<div id="err"></div>

</div>

</div>

<script>

function t(){
document.getElementById("time").innerText=new Date().toLocaleString();
}
setInterval(t,1000);t();

function calc(){

let CO2=+CO2.value;
let CO=+CO.value;
let O2=+O2.value;
let HC=+HC.value/10000;
let NO=+NO.value/10000;

let Hcv=+Hcv.value;
let Ocv=+Ocv.value;
let n=+n.value;

let Vf=+Vf.value;
let rho=+rho.value;

let T=+T.value;
let P=+P.value;

let mW=+mW.value;
let CpW=+CpW.value;
let CpG=+CpG.value;

let Tgi=+Tgi.value;
let Tgo=+Tgo.value;
let Twi=+Twi.value;
let Two=+Two.value;

warn.innerHTML="";

if(CO2==0){
warn.innerHTML="CO2 ห้ามเป็น 0";
return;
}

let num=CO2+CO/2+O2+NO/2+
((Hcv/4)*(3.5/(3.5+(CO/CO2)))-(Ocv/2))*(CO2+CO);

let den=(1+Hcv/4-Ocv/2)*(CO2+CO+n*HC);

if(Math.abs(den)<1e-6){return;}

let lambda=num/den;

let A0=(22.4/0.21)*(1/12+(1/4)*(Hcv-Ocv/8));
let G=(lambda-0.21)*A0+22.4*(1/12);

let mf=(Vf*rho)/(60*1e6);
let Vstd=G*mf;
let Vact=Vstd*(T/273);

let rhoEx=(P*29)/(8314*T);

let mDry=rhoEx*Vact;

let dTg=Tgi-Tgo;
let dTw=Two-Twi;

if(Math.abs(dTg)<1e-6){
warn.innerHTML="ΔT gas = 0";
return;
}

let mEB=mW*(CpW/CpG)*(dTw/dTg);

let err=((mEB-mDry)/mDry)*100;
let absErr=Math.abs(err);

lambdaOut(lambda);
dry.innerText=mDry.toFixed(6);
eb.innerText=mEB.toFixed(6);
errOut(err,absErr);

}

function lambdaOut(l){
lambda.innerText=l.toFixed(4);
lambda.className="result";

if(Math.abs(l-1)<0.05){
lambda.classList.add("green");
}else if(l>1){
lambda.classList.add("blue");
}else{
lambda.classList.add("red");
}
}

function errOut(e,a){
err.innerText=e.toFixed(2)+"%";

if(a<5){
err.className="green";
}else if(a<15){
err.className="yellow";
}else{
err.className="red";
}
}

document.querySelectorAll("input").forEach(i=>i.addEventListener("input",calc));

calc();

</script>

</body>
</html>
