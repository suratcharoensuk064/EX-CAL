<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Exhaust Analysis Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-mode">
    <div class="container">
        <h1>Engine Exhaust Analysis Tool</h1>
        <div class="input-group">
            <label for="gas-analyzer">Gas Analyzer</label>
            <input type="text" id="gas-analyzer" placeholder="Enter gas composition">
        </div>
        <div class="input-group">
            <label for="fuel-properties">Fuel Properties</label>
            <input type="text" id="fuel-properties" placeholder="Enter fuel properties">
        </div>
        <div class="input-group">
            <label for="fuel-flow">Fuel Flow</label>
            <input type="number" id="fuel-flow" placeholder="Enter fuel flow rate">
        </div>
        <div class="input-group">
            <label for="exhaust-conditions">Exhaust Conditions</label>
            <input type="text" id="exhaust-conditions" placeholder="Enter exhaust conditions">
        </div>
        <div class="input-group">
            <label for="energy-balance">Energy Balance</label>
            <input type="text" id="energy-balance" placeholder="Enter energy balance">
        </div>
        <button id="calculate">Calculate</button>
        <div id="results"></div>
        <div class="error-analysis"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
